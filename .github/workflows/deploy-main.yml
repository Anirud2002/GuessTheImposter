name: Deploy on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (tests + web build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shared tests
        run: npm test

      - name: Smoke check backend health
        run: |
          npm run start -w @imposter/server &
          npm run smoke:health

      - name: Build web app
        run: npm run build -w @imposter/web

  deploy_server:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy_web:
    name: Deploy frontend (Netlify)
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Trigger Netlify build hook
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "NETLIFY_BUILD_HOOK_URL is not set"
            exit 1
          fi
          curl -fsS -X POST "$NETLIFY_BUILD_HOOK_URL"
